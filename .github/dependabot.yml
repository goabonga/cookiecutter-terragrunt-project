# Dependabot v2 configuration.

version: 2

updates:
  # Python dev tooling via uv.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    ignore:
      # `hatchling` lives in [build-system].requires; Dependabot's uv
      # FileUpdater cannot write back to that table. Bump it by hand.
      - dependency-name: "hatchling"
    groups:
      dev-tools:
        applies-to: version-updates
        patterns:
          - "ruff"
          - "pytest*"
          - "cookiecutter"
          - "pyyaml"
          - "pre-commit"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps)"
    labels:
      - "dependencies"
      - "python"

  # Pinned versions of GitHub Actions in .github/workflows/*.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    groups:
      ci-actions:
        applies-to: version-updates
        patterns:
          - "actions/*"
          - "astral-sh/*"
          - "google/*"
          - "pypa/*"
          - "compilerla/*"
          - "pre-commit/*"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
