name: Bug Report
description: Report a problem with the template or the generated project
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: dropdown
    id: how
    attributes:
      label: How did you generate the project?
      options:
        - "cookiecutter gh:goabonga/cookiecutter-terragrunt-project"
        - "pip install + cookiecutter (PyPI)"
        - "cookiecutter . (local clone)"
    validations:
      required: true

  - type: input
    id: cookiecutter-version
    attributes:
      label: Cookiecutter version
      description: "Output of `cookiecutter --version`."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug (in the prompts, the rendered output, or the .bashrc helpers).
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: The exact command(s) and the answers you gave to the prompts.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include the error output or the incorrect generated file.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      render: shell
