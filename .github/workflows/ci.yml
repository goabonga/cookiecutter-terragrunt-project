name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Lint with ruff (the template tree is excluded via pyproject).
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check --output-format=github .
      - name: Format check
        run: uv run ruff format --check .

  # Verify the two-line SPDX header on the repo's own files (not the
  # Jinja template tree, which must stay header-free).
  license-headers:
    name: license-headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Check SPDX headers
        run: |
          uv run python scripts/add_license_header.py --path tests --types py --check
          uv run python scripts/add_license_header.py --path scripts --types py --check
          uv run python scripts/add_license_header.py --path .github --types yml --check
          uv run python scripts/add_license_header.py --path . --types toml --check

  # Bake the template and assert the generated structure.
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync
        run: uv sync --frozen
      - name: Run bake tests
        run: uv run pytest

  # Build the distribution and assert the Jinja template (with its
  # `{{ }}` filenames) is included - the package must stay publishable.
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build --out-dir dist
      - name: Verify template is bundled with literal {{ }} names
        run: |
          python -c "
          import glob, zipfile, sys
          whl = sorted(glob.glob('dist/*.whl'))[-1]
          names = zipfile.ZipFile(whl).namelist()
          needed = 'cookiecutter_terragrunt_project/{{cookiecutter.project_slug}}/.bashrc'
          assert 'cookiecutter_terragrunt_project/cookiecutter.json' in names, names
          assert needed in names, names
          print('wheel OK:', whl)
          "
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          if-no-files-found: error

  # Audit the locked dependency graph against the PyPI advisory DB.
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync
        run: uv sync --frozen
      - name: Run pip-audit
        run: uvx pip-audit --skip-editable --path .venv

  # Multi-source vulnerability scan via OSV-Scanner (reads uv.lock).
  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install OSV-Scanner
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64" \
            -o "$HOME/.local/bin/osv-scanner"
          chmod +x "$HOME/.local/bin/osv-scanner"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run OSV-Scanner
        run: osv-scanner scan source --lockfile=uv.lock

  # Release on main only: bump the version, write the changelog, create
  # the release commit + tag and push them back. Gated on every check.
  release:
    name: release
    needs: [lint, license-headers, test, build, pip-audit, osv-scanner]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      no_bumps: ${{ steps.bump.outputs.no_bumps }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install multicz
        run: uv tool install multicz
      - name: Configure git author
        run: |
          NAME="${{ github.event.head_commit.author.name }}"
          EMAIL="${{ github.event.head_commit.author.email }}"
          git config user.name  "${NAME:-github-actions[bot]}"
          git config user.email "${EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}"
      - name: Detect GPG availability
        id: gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$GPG_PASSPHRASE" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Import and unlock GPG key
        if: steps.gpg.outputs.available == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo test | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
            --pinentry-mode loopback --sign > /dev/null
          KEY_ID=$(gpg --list-secret-keys --with-colons \
            | awk -F: '/^sec/{print $5; exit}')
          git config user.signingkey "$KEY_ID"
      - name: Plan release
        run: uv tool run multicz plan --summary "$GITHUB_STEP_SUMMARY"
      - name: Bump, commit, tag, push (signed)
        id: bump_signed
        if: steps.gpg.outputs.available == 'true'
        run: |
          set -euo pipefail
          PLAN=$(uv tool run multicz bump --commit --tag --push --sign --output json)
          BUMPED=$(echo "$PLAN" | jq -r '.bumps | keys | join(" ")')
          if [ -z "$BUMPED" ]; then
            echo "no_bumps=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_bumps=false" >> "$GITHUB_OUTPUT"
            echo "version=$(uv tool run multicz get cookiecutter-terragrunt-project)" >> "$GITHUB_OUTPUT"
          fi
      - name: Bump, commit, tag, push
        id: bump_unsigned
        if: steps.gpg.outputs.available != 'true'
        run: |
          set -euo pipefail
          PLAN=$(uv tool run multicz bump --commit --tag --push --output json)
          BUMPED=$(echo "$PLAN" | jq -r '.bumps | keys | join(" ")')
          if [ -z "$BUMPED" ]; then
            echo "no_bumps=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_bumps=false" >> "$GITHUB_OUTPUT"
            echo "version=$(uv tool run multicz get cookiecutter-terragrunt-project)" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve release outputs
        id: bump
        run: |
          if [ "${{ steps.gpg.outputs.available }}" = "true" ]; then
            echo 'no_bumps=${{ steps.bump_signed.outputs.no_bumps }}' >> "$GITHUB_OUTPUT"
            echo 'version=${{ steps.bump_signed.outputs.version }}' >> "$GITHUB_OUTPUT"
          else
            echo 'no_bumps=${{ steps.bump_unsigned.outputs.no_bumps }}' >> "$GITHUB_OUTPUT"
            echo 'version=${{ steps.bump_unsigned.outputs.version }}' >> "$GITHUB_OUTPUT"
          fi

  # Build and publish the packaged template to PyPI, then cut the GitHub
  # release. Trusted Publishing (OIDC) via the `pypi` environment, with a
  # token fallback. Only when a bump happened.
  pypi-publish:
    name: pypi-publish
    needs: [release]
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.release.result == 'success'
      && needs.release.outputs.no_bumps == 'false'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cookiecutter-terragrunt-project/
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install multicz
        run: uv tool install multicz
      - name: Build wheel and sdist
        run: |
          set -euo pipefail
          uv build --out-dir dist
          ls -l dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ needs.release.outputs.version }}"
          # multicz tags with tag_format = "{version}" (bare). Reuse it.
          tag="${version}"
          notes=$(uv tool run multicz release-notes --tag "$tag")
          gh release create "$tag" --title "$tag" --notes "$notes" dist/*
