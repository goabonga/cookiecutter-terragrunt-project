# Local pre-commit configuration mirroring the CI quality gates.
# Install once per clone: `uv run pre-commit install` (installs the
# pre-commit AND commit-msg hooks). Run on the whole tree:
# `uv run pre-commit run --all-files`.

default_install_hook_types: [pre-commit, commit-msg]
default_language_version:
  python: python3.12

# The Cookiecutter template tree holds Jinja-templated, non-Python files
# (invalid YAML/TOML by design); never lint, format or rewrite it.
exclude: '^\{\{cookiecutter\.project_slug\}\}/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true

  - repo: local
    hooks:
      - id: spdx-headers-tests
        name: SPDX headers (tests/)
        entry: python scripts/add_license_header.py --path tests --types py --check
        language: system
        pass_filenames: false
        files: ^tests/.*\.py$
      - id: spdx-headers-scripts
        name: SPDX headers (scripts/)
        entry: python scripts/add_license_header.py --path scripts --types py --check
        language: system
        pass_filenames: false
        files: ^scripts/.*\.py$
      - id: spdx-headers-workflows
        name: SPDX headers (.github/)
        entry: python scripts/add_license_header.py --path .github --types yml --check
        language: system
        pass_filenames: false
        files: ^\.github/.*\.ya?ml$
      - id: spdx-headers-root-toml
        name: SPDX headers (root *.toml)
        entry: python scripts/add_license_header.py --path . --types toml --check
        language: system
        pass_filenames: false
        files: ^[^/]+\.toml$

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - perf
          - refactor
          - docs
          - test
          - chore
          - ci
          - build
          - style
          - deprecate
          - remove
